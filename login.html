<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Back</title>
    <link rel="stylesheet" href="login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="left"></div>
        <div class="right">
            <div id="img">
            <img src="images/foodielogo.png" alt="">
            </div>
            <div id="wel">
                <span id="well">Welcome Back!</span>
                <span id="log">Log in to your account to continue</span>
            </div>
            <form action="/welcomepage" method="post">
                <div id="mai">
                <span>Email Address</span>
                <input type="text" id="email" name="email" placeholder="Enter your email address" required>
                </div>
                <br><br><br>
                <div id="pas">
                <span>Password</span>
                <input type="password" id="password" name="password" placeholder="Enter Password" required>
                </div>
                <br>
            <div id="sec">
            <span id="for"><a href="">Forgot Password?</a></span>
            <span id="or"><img src="images/Vector 50.png" alt="line">or continue with<img src="images/Vector 50.png" alt="line"></span>
            </div>
            <div class="social">
                <a href=""><img src="images/googleicon.png" alt="google"></a>
                <a href=""><img src="images/appleicon.png" alt="apple"></a>
            </div>
            <div class="dont">
            <button id="loginn" type="submit">Log in <img src="images/Vector (1).png" alt="arrow"></button>
            </form>
            <div id="last">
            <span id="don">
                Don't have an account yet?
            </span>
            <span id="sig"><a href="/signup.html">Sign UP</a></span>
            </div>
            </div>
        </div>
    </header>
    <script type="module" src="firebase.js"></script>
</body>
</html>
